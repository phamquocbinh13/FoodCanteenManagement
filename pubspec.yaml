name: food_canteen_management
description: "Food Canteen Management."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  freezed_annotation: ^3.0.0
  json_annotation: ^4.12.0
  go_router: ^15.1.2
  flutter_riverpod: ^2.6.1
  get_it: ^8.0.3
  intl: ^0.20.2
  uuid: ^4.5.1
  shared_preferences: ^2.5.3
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.2.0
  http: ^1.6.0
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.15
  freezed: ^3.0.0
  json_serializable: ^6.9.5

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/common/
    - assets/images/login/
    - assets/images/menu/
  fonts:
    - family: PlusJakartaSans
      fonts:
        - asset: assets/fonts/PlusJakartaSans-Regular.ttf
          weight: 400
        - asset: assets/fonts/PlusJakartaSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/PlusJakartaSans-SemiBold.ttf
          weight: 600
    - family: Fraunces
      fonts:
        - asset: assets/fonts/Fraunces-Variable.ttf
          weight: 600
